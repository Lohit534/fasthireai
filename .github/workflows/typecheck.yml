name: Pull Request Type Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/typecheck.yml'

jobs:
  typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type Check
        id: tsc
        run: npx tsc --noEmit

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const success = ${{ steps.tsc.outcome == 'success' }};
            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log("Not a Pull Request, skipping comment.");
              return;
            }
            const body = success 
              ? "### TypeScript Verification\n\n✅ **Type Check Passed!** All project interfaces and layout files compile cleanly."
              : "### TypeScript Verification\n\n❌ **Type Check Failed!** Please review compiler logs to fix diagnostic type issues.";
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
